# This is a Declarative Automation Bundle definition for f1_analyzer.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: f1_analyzer

resources:
  apps:
    f1-analyzer-app:
      name: "f1-analyzer-app"
      source_code_path: .
      description: "A Streamlit app that uses crewai agent"
      resources:
        - name: OPENAI_API_KEY
          secret:
            key: OPENAI_API_KEY
            permission: READ
            scope: f1_analyzer_scope

targets:
  dev:
    mode: development
    default: true
