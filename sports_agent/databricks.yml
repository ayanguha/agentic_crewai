# This is a Declarative Automation Bundle definition for f1_analyzer.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: f1_analyzer

resources:
  apps:
    f1-analyzer-app:
      name: "f1-analyzer-app"
      source_code_path: /Workspace/Users/ayan.guha@versent.com.au/.bundle/${bundle.name}/${bundle.target}/files
      description: "A Streamlit app that uses a SQL warehouse"
      resources:
        - name: OPENAI_API_KEY
          secret:
            key: OPENAI_API_KEY
            permission: READ
            scope: sports-agent


targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://versent-data-practice.cloud.databricks.com
      root_path: /Workspace/Users/ayan.guha@versent.com.au/.bundle/${bundle.name}/${bundle.target}
    permissions:
      - group_name: users
        level: CAN_MANAGE
      - user_name: ayan.guha@versent.com.au
        level: CAN_MANAGE